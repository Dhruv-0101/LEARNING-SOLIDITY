<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solidity Files Viewer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0f14;
        --sidebar-bg: #12151c;
        --panel-bg: #161b25;
        --border: #1e2535;
        --accent: #00e5ff;
        --accent2: #7c3aed;
        --text: #c9d1e0;
        --text-dim: #5a6380;
        --text-bright: #eef2ff;
        --active-bg: #0d2a35;
        --active-border: #00e5ff;
        --header-h: 58px;
        --sidebar-w: 275px;

        --c-comment: #546e8a;
        --c-keyword: #c792ea;
        --c-type: #82aaff;
        --c-string: #c3e88d;
        --c-number: #f78c6c;
        --c-function: #82e0ff;
        --c-operator: #89ddff;
        --c-pragma: #ffcb6b;
        --c-plain: #c9d1e0;
      }

      html,
      body {
        height: 100%;
        font-family: "Syne", sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
      }

      /* HEADER */
      header {
        height: var(--header-h);
        background: var(--sidebar-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 28px;
        gap: 14px;
        flex-shrink: 0;
      }
      .logo-icon {
        width: 34px;
        height: 34px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 17px;
        font-weight: 800;
        color: #fff;
        letter-spacing: -1px;
        flex-shrink: 0;
      }
      header h1 {
        font-size: 17px;
        font-weight: 700;
        color: var(--text-bright);
        letter-spacing: 0.3px;
      }
      header h1 span {
        color: var(--accent);
      }

      .back-btn {
        display: none;
        align-items: center;
        gap: 7px;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 700;
        color: var(--text-dim);
        background: var(--border);
        border: none;
        padding: 6px 14px;
        border-radius: 7px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .back-btn:hover {
        background: rgba(0, 229, 255, 0.12);
        color: var(--accent);
      }
      .back-btn.visible {
        display: flex;
      }

      .header-right {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .file-count-badge {
        font-size: 12px;
        color: var(--text-dim);
        background: var(--border);
        padding: 3px 12px;
        border-radius: 20px;
      }

      /* APP SHELL */
      .app {
        display: flex;
        flex-direction: column;
        height: calc(100vh - var(--header-h));
        overflow: hidden;
      }

      /* ══════ HOME PAGE ══════ */
      #homePage {
        flex: 1;
        overflow-y: auto;
        padding: 48px 40px 60px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .home-hero {
        text-align: center;
        margin-bottom: 46px;
      }
      .home-hero-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 14px;
        opacity: 0.8;
      }
      .home-hero h2 {
        font-size: 36px;
        font-weight: 800;
        color: var(--text-bright);
        letter-spacing: -0.5px;
        line-height: 1.15;
      }
      .home-hero h2 span {
        background: linear-gradient(90deg, var(--accent), #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .home-hero p {
        margin-top: 14px;
        font-size: 14px;
        color: var(--text-dim);
        line-height: 1.6;
      }

      .stats-row {
        display: flex;
        gap: 16px;
        margin-bottom: 44px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .stat-card {
        background: var(--sidebar-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 18px 28px;
        text-align: center;
        min-width: 130px;
      }
      .stat-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 28px;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
      }
      .stat-label {
        font-size: 11px;
        color: var(--text-dim);
        margin-top: 5px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-dim);
        align-self: flex-start;
        margin-bottom: 18px;
      }

      .files-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
        width: 100%;
        max-width: 1100px;
      }

      .file-card {
        background: var(--sidebar-bg);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 22px 24px;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.35s ease both;
      }
      .file-card:nth-child(1) {
        animation-delay: 0.05s;
      }
      .file-card:nth-child(2) {
        animation-delay: 0.12s;
      }
      .file-card:nth-child(3) {
        animation-delay: 0.19s;
      }
      .file-card:nth-child(4) {
        animation-delay: 0.26s;
      }
      .file-card:nth-child(5) {
        animation-delay: 0.33s;
      }
      .file-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--accent), transparent);
        opacity: 0;
        transition: opacity 0.2s;
      }
      .file-card:hover {
        border-color: rgba(0, 229, 255, 0.35);
        background: #14192a;
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      .file-card:hover::before {
        opacity: 1;
      }

      .card-top {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 16px;
      }
      .card-file-icon {
        width: 42px;
        height: 42px;
        background: linear-gradient(
          135deg,
          rgba(0, 229, 255, 0.12),
          rgba(124, 58, 237, 0.12)
        );
        border: 1px solid rgba(0, 229, 255, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .card-file-icon svg {
        width: 20px;
        height: 20px;
      }
      .card-name-wrap {
        flex: 1;
        min-width: 0;
      }
      .card-filename {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 700;
        color: var(--text-bright);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
      }
      .card-type {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--accent);
        margin-top: 4px;
        background: rgba(0, 229, 255, 0.08);
        border: 1px solid rgba(0, 229, 255, 0.2);
        padding: 1px 7px;
        border-radius: 4px;
        display: inline-block;
      }
      .card-preview {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        line-height: 1.65;
        color: var(--c-comment);
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 16px;
        white-space: pre;
        overflow: hidden;
        max-height: 68px;
      }
      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .card-lines {
        font-size: 11px;
        color: var(--text-dim);
      }
      .card-open-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: "Syne", sans-serif;
        font-size: 11px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .card-open-btn svg {
        width: 12px;
        height: 12px;
      }

      /* ══════ VIEWER PAGE ══════ */
      #viewerPage {
        display: none;
        flex: 1;
        overflow: hidden;
        flex-direction: row;
      }
      #viewerPage.visible {
        display: flex;
      }

      .v-sidebar {
        width: var(--sidebar-w);
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow-y: auto;
      }
      .sidebar-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--text-dim);
        padding: 18px 20px 10px;
      }
      .s-file-btn {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 20px;
        cursor: pointer;
        border: none;
        background: transparent;
        width: 100%;
        text-align: left;
        border-left: 3px solid transparent;
        transition: all 0.16s ease;
      }
      .s-file-btn:hover {
        background: rgba(0, 229, 255, 0.05);
      }
      .s-file-btn.active {
        background: var(--active-bg);
        border-left-color: var(--active-border);
      }
      .s-icon {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        background: #1a2035;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        margin-top: 1px;
      }
      .s-icon svg {
        width: 14px;
        height: 14px;
      }
      .s-file-btn.active .s-icon {
        background: rgba(0, 229, 255, 0.15);
      }
      .s-meta {
        flex: 1;
        min-width: 0;
      }
      .s-name {
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: block;
      }
      .s-file-btn.active .s-name {
        color: var(--accent);
      }
      .s-sub {
        font-size: 10px;
        color: var(--text-dim);
        margin-top: 2px;
        display: block;
      }

      .v-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .code-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 24px;
        height: 48px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-bg);
        flex-shrink: 0;
      }
      .code-title {
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-bright);
      }
      .sol-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 600;
        color: var(--accent);
        background: rgba(0, 229, 255, 0.1);
        border: 1px solid rgba(0, 229, 255, 0.25);
        padding: 2px 8px;
        border-radius: 4px;
        letter-spacing: 0.5px;
      }
      .copy-btn {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: "Syne", sans-serif;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-dim);
        background: var(--border);
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
        letter-spacing: 0.3px;
      }
      .copy-btn:hover {
        background: rgba(0, 229, 255, 0.15);
        color: var(--accent);
      }
      .copy-btn.copied {
        color: #4caf50;
        background: rgba(76, 175, 80, 0.12);
      }

      .code-wrap {
        flex: 1;
        overflow: auto;
        padding: 20px 0;
      }
      .code-block {
        display: table;
        min-width: 100%;
        font-family: "JetBrains Mono", monospace;
        font-size: 13.5px;
        line-height: 1.75;
      }
      .code-line {
        display: table-row;
      }
      .line-num {
        display: table-cell;
        user-select: none;
        text-align: right;
        padding: 0 16px 0 24px;
        color: #2e3d55;
        font-size: 12px;
        width: 1%;
        white-space: nowrap;
        vertical-align: top;
      }
      .line-code {
        display: table-cell;
        padding: 0 32px 0 4px;
        white-space: pre;
        color: var(--c-plain);
        vertical-align: top;
      }
      .code-line:hover .line-num {
        color: var(--text-dim);
      }
      .code-line:hover .line-code {
        background: rgba(255, 255, 255, 0.025);
      }

      .c-comment {
        color: var(--c-comment);
        font-style: italic;
      }
      .c-keyword {
        color: var(--c-keyword);
        font-weight: 600;
      }
      .c-type {
        color: var(--c-type);
      }
      .c-string {
        color: var(--c-string);
      }
      .c-number {
        color: var(--c-number);
      }
      .c-fn {
        color: var(--c-function);
      }
      .c-op {
        color: var(--c-operator);
      }
      .c-pragma {
        color: var(--c-pragma);
      }
      .c-plain {
        color: var(--c-plain);
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e2535;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2a3550;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>

// -->The Stack is the fastest but most limited storage location.
// -->It is used for small computations and local function variables.
// -->Solidity functions use the stack to store temporary values during execution.
// -->It has a strict size limit (1024 slots), so only small values (like uint, bool, address) are stored here.
// -->It is automatically cleared when the function execution ends.
// -->No gas cost, as it directly uses CPU registers.


// 2. Memory (Temporary, Used Inside Functions)
// -->Memory is similar to RAM and is used to store temporary variables like arrays, structs, and strings inside a function.
// --> Data in memory exists only during function execution and is cleared afterward.
// -->Moderate gas cost—reading is cheap, but writing consumes gas.
// -->Used when dealing with dynamic data types (arrays, structs, mappings, strings).


// 3. Storage (Permanent, Contract-Level Data)
// -->Storage is the most important type of memory in Solidity.
// -->It stores contract state variables that persist on the blockchain.
// -->Expensive gas cost—modifying storage variables is costly since it changes the blockchain state.
// -->Unlike stack and memory, storage remains even after function execution and transactions.

pragma solidity >=0.8.2 <0.9.0;

contract IntegerExample {
    // State variables to store signed integers
    int256 public smallNumber; // 256-bit signed integer
    int8 public tinyNumber; // 8-bit signed integer

    // Constructor to initialize the state variables
    constructor(int256 _smallNumber, int8 _tinyNumber) {
        smallNumber = _smallNumber;
        tinyNumber = _tinyNumber;
    }

    // Function to set new values for the state variables
    function setNumbers(int256 _smallNumber, int8 _tinyNumber) public {
        smallNumber = _smallNumber;
        tinyNumber = _tinyNumber;
    }

    // Function to get the values of the state variables
    function getNumbers() public view returns (int256, int8) {
        return (smallNumber, tinyNumber);
    }

    // Function to demonstrate arithmetic operations with integers
    function addNumbers(int256 a, int256 b) public pure returns (int256) {
        return a + b;
    }

    function subtractNumbers(int256 a, int256 b) public pure returns (int256) {
        return a - b;
    }

    function multiplyNumbers(int256 a, int256 b) public pure returns (int256) {
        return a * b;
    }

    function divideNumbers(int256 a, int256 b) public pure returns (int256) {
        require(b != 0, "Division by zero is not allowed");

    // For loop example
    function forLoopExample(uint256 n) public pure returns (uint256) {
        uint256 sum = 0;
        for (uint256 i = 0; i <= n; i++) {
            sum = sum + i;
        }
        return sum;
    }

    // While loop example
    function whileLoopExample(uint256 n) public pure returns (uint256) {
        uint256 sum = 0;
        uint256 i = 0;
        while (i <= n) {
            sum += i;
            i++;
        }
        return sum;

    function doWhileLoopExample(uint256 n) public pure returns (uint256) {

                sum = sum + i;
                i = i + 1;
            } while (i <= n);
        }
        return sum;
    }

    // Function to add an element to the end of the dynamic array
    function addElement(uint256 _element) public {
        dynamicArray.push(_element);
    }

    // Function to get the length of the dynamic array
    function getArrayLength() public view returns (uint256) {
        return dynamicArray.length;
    }

    // Function to get a specific element from the dynamic array
    function getElement(uint256 _index) public view returns (uint256) {
        require(_index < dynamicArray.length, "Index out of bounds");
        return dynamicArray[_index];
    }

    // Function to remove the last element from the dynamic array
    function removeLastElement() public {
        require(dynamicArray.length > 0, "Array is empty");
        dynamicArray.pop();
    }

    // Function to update an element at a specific index in the dynamic array
    function updateElement(uint256 _index, uint256 _value) public {
        require(_index < dynamicArray.length, "Index out of bounds");
        dynamicArray[_index] = _value;
    }

    // Function to remove an element at a specific index (by shifting)
    function removeElementAt(uint256 _index) public {
        require(_index < dynamicArray.length, "Index out of bounds");
        for (uint256 i = _index; i < dynamicArray.length - 1; i++) {
            dynamicArray[i] = dynamicArray[i + 1];
        }
        dynamicArray.pop(); // Remove the last duplicate element
    }

    //first entity
    struct Voter {
        string name;
        uint256 age;
        uint256 voterId;
        Gender gender;
        uint256 voteCandidateId; //candidate id to whom the voter has voted
        address voterAddress; //EOA of the voter
    }

    //second entity
    struct Candidate {
        string name;
        string party;
        uint256 age;
        Gender gender;
        uint256 candidateId;
        address candidateAddress; //candidate EOA
        uint256 votes; //number of votes
    }

    //third entity
    address public electionCommission;
    address public winner;
    uint256 nextVoterId = 1; //starting
    uint256 nextCandidateId = 1; //starting

    //voting period
    uint256 startTime;
    uint256 endTime;
    bool stopVoting;

    mapping(uint256 => Voter) voterDetails;
    mapping(uint256 => Candidate) candidateDetails;

    enum VotingStatus {
        NotStarted,
        InProgress,
        Ended
    }
    enum Gender {
        NotSpecified,
        Male,
        Female,
        Other
    }

    constructor() {
        electionCommission = msg.sender; //msg.sender is a global variable
    }

    modifier isVotingOver() {
        require(
            block.timestamp <= endTime && stopVoting == false,
            "Voting time is over"
        ); //user is modifier ko call kab karega uspe dependent hai
        _;
    }

    modifier onlyCommissioner() {
        require(msg.sender == electionCommission, "Not authuorized");
        _;
    }

    modifier isValidAge(uint256 _age) {
        require(_age >= 18, "not eligible for voting");
        _; //agar yeh nai hua to? then send this statement.
    }

    function isCandidateNotRegistered(address _person)
        private
        view
        returns (bool)
    {
        for (uint256 i = 1; i < nextCandidateId; i++) {
            if (candidateDetails[i].candidateAddress == _person) {
                return false;
            }
        }
        return true;
    }

    function isVoterNotRegistered(address _person) private view returns (bool) {
        for (uint256 i = 1; i < nextVoterId; i++) {
            if (voterDetails[i].voterAddress == _person) {
                return false;
            }
        }
        return true;
    }

    function registerCandidate(
        string calldata _name,
        string calldata _party,
        uint256 _age,
        Gender _gender
    ) external isValidAge(_age) {
        require(
            isCandidateNotRegistered(msg.sender),
            "You are already registered"
        );
        require(nextCandidateId < 3, "Candidate Registration Full");
        require(
            msg.sender != electionCommission,
            "Election Commision not allowed to register"
        );

        candidateDetails[nextCandidateId] = Candidate({
            name: _name,
            party: _party,
            gender: _gender,
            age: _age,
            candidateId: nextCandidateId,
            candidateAddress: msg.sender,
            votes: 0
        });
        nextCandidateId++;
    }

    //MOST IMP
    function getCandidateList() public view returns (Candidate[] memory) {
        //candidate ka array hai
        Candidate[] memory candidateList = new Candidate[](nextCandidateId - 1); //initialize an empty array of length = \`nextCandidateId - 1\`
        for (uint256 i = 0; i < candidateList.length; i++) {
            candidateList[i] = candidateDetails[i + 1];
        }
        return candidateList;
    }

    function registerVoter(
        string calldata _name,
        uint256 _age,
        Gender _gender
    ) external isValidAge(_age) {
        require(isVoterNotRegistered(msg.sender), "You are already registered");

        voterDetails[nextVoterId] = Voter({
            name: _name,
            age: _age,
            voterId: nextVoterId,
            gender: _gender,
            voteCandidateId: 0,
            voterAddress: msg.sender
        });
        nextVoterId++;
    }

    function getVoterList() public view returns (Voter[] memory) {
        uint256 lengthArr = nextVoterId - 1;
        Voter[] memory voterList = new Voter[](lengthArr);
        for (uint256 i = 0; i < voterList.length; i++) {
            voterList[i] = voterDetails[i + 1];
        }
        return voterList;
    }

    function castVote(uint256 _voterId, uint256 _candidateId)
        external
        isVotingOver
    {
        require(block.timestamp >= startTime, "Voting has not started yet");
        require(
            voterDetails[_voterId].voteCandidateId == 0,
            "You have already voted"
        );
        require(
            voterDetails[_voterId].voterAddress == msg.sender,
            "You are not authourized"
        );
        require(
            _candidateId >= 1 && _candidateId < 3,
            "Candidate Id is not correct"
        );
        voterDetails[_voterId].voteCandidateId = _candidateId; //voting to _candidateId
        candidateDetails[_candidateId].votes++; //increment _candidateId votes
    }

    function setVotingPeriod(
        uint256 _startTimeDuration,
        uint256 _endTimeDuration
    ) external onlyCommissioner {
        require(
            _endTimeDuration > 3600,
            "_endTimeDuration must be greater than 1 hour"
        );
        startTime = 1720799550 + _startTimeDuration; //_startTimeDuration = 3600 , _endTimeDuration = 3600
        endTime = startTime + _endTimeDuration;
    }

    // function setVotingPeriod(uint256 _startInSeconds)
    //     external
    //     onlyCommissioner
    // {
    //     startTime = block.timestamp + _startInSeconds; // Future start time
    //     endTime = startTime + 3600; // 1 hour voting period after start time
    // }
    //If you call setVotingPeriod(7200), voting will start 2 hours from now and last for 1 hour.
    /*
    Whatever number you pass to _startInSeconds means:

    Wait that many seconds from now (block.timestamp).

    After that wait, voting starts.

    Then, in your code, voting will last 1 hour (because of + 3600).

    👉 Example timeline:

    You call setVotingPeriod(7200) at 10:00 AM.

    Voting will start at 12:00 PM (2 hours later).

    Voting will end at 1:00 PM (1 hour after it starts).

    So yes — the number you pass is the delay until voting begins.
    */

    function getVotingStatus() public view returns (VotingStatus) {
        if (startTime == 0) {
            return VotingStatus.NotStarted;
        } else if (endTime > block.timestamp && stopVoting == false) {
            return VotingStatus.InProgress;
        } else {
            return VotingStatus.Ended;
        }
    }

    function announceVotingResult() external onlyCommissioner {
        uint256 max = 0;
        for (uint256 i = 1; i < nextCandidateId; i++) {
            if (candidateDetails[i].votes > max) {
                max = candidateDetails[i].votes;
                winner = candidateDetails[i].candidateAddress;
            }
        }
    }

    function emergencyStopVoting() public onlyCommissioner {
        stopVoting = true;
    }

    //if votingStatus==NotStarted then do this
    //else if votingStatus==Started then do that
    //else bla bla
}

        const src = str;
        const KEYWORDS =
          /^(contract|function|returns|return|public|pure|view|uint256|uint|int256|int|bool|address|string|bytes|mapping|memory|storage|calldata|if|else|for|while|new|emit|event|modifier|require|revert|true|false|this|import|is|struct|enum|constructor|payable|external|internal|private|indexed|override|virtual|abstract|using|library|interface|try|catch|delete|assembly|pragma|solidity)(?=[^a-zA-Z0-9_]|$)/;
        const TYPES = [
          "uint256",
          "uint",
          "int256",
          "int",
          "bool",
          "address",
          "string",
          "bytes",
          "mapping",
        ];
        while (i < src.length) {
          if (src[i] === "/" && src[i + 1] === "/") {
            out += `<span class="c-comment">${esc(src.slice(i))}</span>`;
            break;
          }
          if (src[i] === '"' || src[i] === "'") {
            const q = src[i];
            let j = i + 1;
            while (j < src.length && src[j] !== q) j++;
            j++;
            out += `<span class="c-string">${esc(src.slice(i, j))}</span>`;
            i = j;
            continue;
          }
          if (
            /[0-9]/.test(src[i]) &&
            (i === 0 || /[^a-zA-Z_]/.test(src[i - 1]))
          ) {
            let j = i;
            while (j < src.length && /[0-9a-fA-FxX_.]/.test(src[j])) j++;
            out += `<span class="c-number">${esc(src.slice(i, j))}</span>`;
            i = j;
            continue;
          }
          if (/[a-zA-Z_$]/.test(src[i])) {
            let j = i;
            while (j < src.length && /[a-zA-Z0-9_$]/.test(src[j])) j++;
            const word = src.slice(i, j);
            const km = src.slice(i).match(KEYWORDS);
            if (km && km[0] === word) {
              out += TYPES.includes(word)
                ? `<span class="c-type">${esc(word)}</span>`
                : `<span class="c-keyword">${esc(word)}</span>`;
            } else {
              let k = j;
              while (k < src.length && src[k] === " ") k++;
              out +=
                src[k] === "("
                  ? `<span class="c-fn">${esc(word)}</span>`
                  : esc(word);
            }
            i = j;
            continue;
          }
          if (/[=<>!&|+\-*/%^~]/.test(src[i])) {
            let j = i;
            while (j < src.length && /[=<>!&|+\-*/%^~]/.test(src[j])) j++;
            out += `<span class="c-op">${esc(src.slice(i, j))}</span>`;
            i = j;
            continue;
          }
          out += esc(src[i]);
          i++;
        }
        return out;
      }
      function highlight(code) {
        return code
          .split("\n")
          .map(
            (line, i) =>
              `<div class="code-line"><span class="line-num">${i + 1}</span><span class="line-code">${highlightLine(line)}</span></div>`,
          )
          .join("");
      }

      /* BUILD HOME */
      const FILE_SVG_CARD = `<svg viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
      const ARROW_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

      function buildHome() {
        const totalLines = files.reduce((s, f) => s + f.lines, 0);
        const contracts = files.filter((f) =>
          f.type.startsWith("Contract"),
        ).length;
        document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="stat-num">${files.length}</div><div class="stat-label">Total Files</div></div>
    <div class="stat-card"><div class="stat-num">${totalLines}</div><div class="stat-label">Total Lines</div></div>
    <div class="stat-card"><div class="stat-num">${contracts}</div><div class="stat-label">Contracts</div></div>
  `;
        document.getElementById("filesGrid").innerHTML = files
          .map((f, idx) => {
            const preview = f.content.split("\n").slice(0, 3).join("\n");
            return `<div class="file-card" onclick="openViewer(${idx})">
      <div class="card-top">
        <div class="card-file-icon">${FILE_SVG_CARD}</div>
        <div class="card-name-wrap">
          <span class="card-filename">${f.name}</span>
          <span class="card-type">${f.type}</span>
        </div>
      </div>
      <div class="card-preview">${esc(preview)}</div>
      <div class="card-footer">
        <span class="card-lines">${f.lines} lines</span>
        <span class="card-open-btn">Open ${ARROW_SVG}</span>
      </div>
    </div>`;
          })
          .join("");
        document.getElementById("fileCountBadge").textContent =
          `${files.length} files`;
      }

      /* BUILD SIDEBAR */
      function buildSidebar(activeIdx) {
        document.getElementById("sidebarList").innerHTML = files
          .map(
            (f, idx) => `
    <button class="s-file-btn ${idx === activeIdx ? "active" : ""}" onclick="switchFile(${idx})">
      <div class="s-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="${idx === activeIdx ? "#00e5ff" : "#5a6380"}" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <div class="s-meta">
        <span class="s-name">${f.name}</span>
        <span class="s-sub">${f.lines} lines · ${f.type}</span>
      </div>
    </button>`,
          )
          .join("");
      }

      /* NAVIGATION */
      let currentFile = null;

      function openViewer(idx) {
        currentFile = idx;
        document.getElementById("homePage").style.display = "none";
        document.getElementById("viewerPage").classList.add("visible");
        document.getElementById("backBtn").classList.add("visible");
        buildSidebar(idx);
        loadCode(idx);
      }

      function switchFile(idx) {
        currentFile = idx;
        buildSidebar(idx);
        loadCode(idx);
      }

      function goHome() {
        currentFile = null;
        document.getElementById("viewerPage").classList.remove("visible");
        document.getElementById("homePage").style.display = "flex";
        document.getElementById("backBtn").classList.remove("visible");
      }

      function loadCode(idx) {
        const f = files[idx];
        document.getElementById("panelTitle").textContent = f.name;
        document.getElementById("codeBlock").innerHTML = highlight(f.content);
        const cb = document.getElementById("copyBtn");
        cb.classList.remove("copied");
        cb.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Code`;
      }

      /* COPY */
      function copyCode() {
        if (currentFile === null) return;
        navigator.clipboard.writeText(files[currentFile].content).then(() => {
          const cb = document.getElementById("copyBtn");
          cb.classList.add("copied");
          cb.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
          setTimeout(() => {
            cb.classList.remove("copied");
            cb.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy Code`;
          }, 2200);
        });
      }

      /* INIT */
      buildHome();
    </script>
  </body>
</html>
